name: Release App
on:
  push:
    tags: "*"

env:
  IMAGE_NAME: myjettools/my-reverse-proxy

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Updating version
        run: sed -i -e 's/^version = .*/version = "${{ steps.get_version.outputs.VERSION }}"/' my-reverse-proxy/Cargo.toml

      - name: Build server (release)
        run: cargo build --release
        working-directory: my-reverse-proxy

      - name: Docker login
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
        run: echo "$DOCKER_PASS" | docker login --username "$DOCKER_USER" --password-stdin

      - name: Docker Build and Publish
        working-directory: my-reverse-proxy
        run: |
          docker build -t ${IMAGE_NAME}:${{ steps.get_version.outputs.VERSION }} .
          docker push ${IMAGE_NAME}:${{ steps.get_version.outputs.VERSION }}
